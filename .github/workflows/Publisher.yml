name: Publish (Release)

on:
  push:
    tags:
      - 'mc*'
  workflow_dispatch:

permissions:
  contents: write

env:
  MINECRAFT_VERSION: 1.20.1
  JAVA_VERSION: 17
  CURSEFORGE_ID: 932542
  MODRINTH_ID: PuvRflQn

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v3

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make Gradle Wrapper Executable
        run: chmod +x ./gradlew

      - name: Read Version
        run: |
          # Strict match: only the first 'mod_version = xxx' line, no comments, no old_mod_version
          VERSION=$(grep -m1 '^mod_version\s*=' gradle.properties | awk -F'=' '{print $2}' | tr -d ' ')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          if echo "$VERSION" | grep -qE '\-alpha'; then
            VERSION_TYPE="alpha"
          elif echo "$VERSION" | grep -qE '\-beta|\-rc'; then
            VERSION_TYPE="beta"
          elif [ "$MAJOR" = "0" ]; then
            VERSION_TYPE="alpha"
          else
            VERSION_TYPE="release"
          fi
          echo "VERSION_TYPE=$VERSION_TYPE" >> $GITHUB_ENV

          TAG_NAME="$TRIGGER_TAG"
          if [ "$TAG_NAME" = "master" ] || [ -z "$TAG_NAME" ]; then
            TAG_NAME="${MINECRAFT_VERSION}-${VERSION}"
          fi
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV

          echo "Version: $VERSION  Type: $VERSION_TYPE  Tag: $TAG_NAME"

      - name: Build
        run: ./gradlew build

      - name: Generate Changelog
        run: |
          # Use git tag sorted by creation date — robust against merge commits
          CURRENT_TAG="${{ env.TAG_NAME }}"
          ALL_TAGS=$(git tag --sort=-creatordate)
          PREV_TAG=""
          FOUND=0
          for t in $ALL_TAGS; do
            if [ $FOUND -eq 1 ]; then
              PREV_TAG=$t
              break
            fi
            if [ "$t" = "$CURRENT_TAG" ]; then
              FOUND=1
            fi
          done
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          echo "From: $PREV_TAG -> To: $CURRENT_TAG"
          git log $PREV_TAG..HEAD --pretty=format:"- %s" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "---" >> CHANGELOG.md
          echo "Full commit log:" >> CHANGELOG.md
          git log $PREV_TAG..HEAD --pretty=format:"- %h %s%n  %b" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          cat CHANGELOG.md

      # Step 1: Fabric — all three platforms together (atomic)
      - name: Publish (Fabric)
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ env.MODRINTH_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          curseforge-id: ${{ env.CURSEFORGE_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          github-tag: ${{ env.TAG_NAME }}
          github-token: ${{ secrets.PUBLISH_GITHUB_TOKEN }}

          name: "Lanthanum ${{ env.VERSION }} for Fabric ${{ env.MINECRAFT_VERSION }}"
          version: "${{ env.MINECRAFT_VERSION }}-${{ env.VERSION }}-fabric"
          version-type: ${{ env.VERSION_TYPE }}
          changelog-file: CHANGELOG.md

          files: fabric/build/libs/!(*-dev|*-sources|*-shadow).jar

          loaders: fabric
          game-versions: ${{ env.MINECRAFT_VERSION }}
          java: ${{ env.JAVA_VERSION }}

          retry-attempts: 3
          retry-delay: 10000

      # Step 2: Forge — all three platforms together (atomic)
      - name: Publish (Forge)
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ env.MODRINTH_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          curseforge-id: ${{ env.CURSEFORGE_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          github-tag: ${{ env.TAG_NAME }}
          github-token: ${{ secrets.PUBLISH_GITHUB_TOKEN }}

          name: "Lanthanum ${{ env.VERSION }} for Forge ${{ env.MINECRAFT_VERSION }}"
          version: "${{ env.MINECRAFT_VERSION }}-${{ env.VERSION }}-forge"
          version-type: ${{ env.VERSION_TYPE }}
          changelog-file: CHANGELOG.md

          files: forge/build/libs/!(*-dev|*-sources|*-shadow).jar

          loaders: forge
          game-versions: ${{ env.MINECRAFT_VERSION }}
          java: ${{ env.JAVA_VERSION }}

          retry-attempts: 3
          retry-delay: 10000
